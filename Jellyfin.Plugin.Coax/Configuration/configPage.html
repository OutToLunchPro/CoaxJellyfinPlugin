<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Coax</title>
</head>
<body>
    <div id="CoaxConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
         data-require="emby-button,emby-input">
        <div data-role="content">
            <div class="content-primary">
                <h2>Coax</h2>
                <p>
                    This plugin is stateless and requires no configuration. It exposes
                    <code>GET /coax/info</code> and <code>POST /coax/index</code> so the Coax app
                    can build Actor/Director channels from this server's movie and TV libraries.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
